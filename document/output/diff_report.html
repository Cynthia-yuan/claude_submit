<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>diff_report - 验证报告</title>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}
.container {
    max-width: 1400px;
    margin: 0 auto;
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    overflow: hidden;
}
header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 30px;
    text-align: center;
}
header h1 { font-size: 28px; margin-bottom: 10px; }
.timestamp { opacity: 0.9; font-size: 14px; }
.total-summary {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    background: #f8f9fa;
    flex-wrap: wrap;
}
.stat-item {
    padding: 10px 20px;
    background: white;
    border-radius: 25px;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.stat-item strong { color: #667eea; font-size: 18px; }
.stat-pass { color: #28a745; }
.stat-fail { color: #dc3545; }
.stat-warn { color: #ffc107; }
.stat-skip { color: #6c757d; }
.tabs { display: flex; background: #f8f9fa; border-bottom: 1px solid #dee2e6; }
.tab-button {
    flex: 1;
    padding: 15px 20px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    color: #495057;
    border-bottom: 3px solid transparent;
}
.tab-button:hover { background: #e9ecef; color: #667eea; }
.tab-button.active { color: #667eea; border-bottom-color: #667eea; background: white; }
.content { padding: 30px; }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.summary { margin-bottom: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px; }
.summary h2 { font-size: 20px; margin-bottom: 15px; color: #495057; }
.summary-stats { display: flex; flex-wrap: wrap; gap: 15px; }
.data-table { width: 100%; border-collapse: collapse; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.data-table thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
.data-table th { padding: 15px; text-align: left; font-weight: 600; }
.data-table td { padding: 12px 15px; border-bottom: 1px solid #e9ecef; }
.data-table tbody tr:hover { background: #f8f9fa; }
.status-pass { color: #28a745; font-weight: 600; }
.status-fail { color: #dc3545; font-weight: 600; }
.status-warn { color: #ffc107; font-weight: 600; }
.status-skip { color: #6c757d; font-weight: 600; }
@media (max-width: 768px) {
    .tabs { flex-direction: column; }
    .tab-button { border-left: 3px solid transparent; }
    .tab-button.active { border-left-color: #667eea; }
    .data-table { font-size: 12px; }
    .data-table th, .data-table td { padding: 8px; }
}

</style>
</head>
<body>
<div class="container">
<header>
<h1>diff_report</h1>
<p class="timestamp">生成时间: 2026-03-31 10:20:09</p>
</header>
<div class="total-summary">
<span class="stat-item">总计: <strong>3</strong></span>
<span class="stat-item stat-pass">通过: 2</span>
<span class="stat-item stat-fail">失败: 1</span>
<span class="stat-item stat-warn">警告: 0</span>
<span class="stat-item stat-skip">跳过: 0</span>
</div>
<nav class="tabs">
<button class="tab-button active" onclick="showTab('删除')">删除</button>
<button class="tab-button " onclick="showTab('新增')">新增</button>
</nav>
<div class="content">
<div id="删除" class="tab-content active">
<div class="summary">
<h2>删除</h2>
<div class="summary-stats">
<span class="stat-item">总计: <strong>2</strong></span>
<span class="stat-item stat-pass">通过: 2</span>
</div>
</div>
<table class="data-table">
<thead><tr>
<th>章节</th><th>变更项</th><th>描述</th><th>验证状态</th><th>备注</th>
</tr></thead>
<tbody>
<tr>
<td>5.1</td>
<td>/sys/class/raw</td>
<td>接口变成/sys/class/new_raw</td>
<td class="status status-通过">通过</td>
<td>旧接口已删除，新接口已存在 ✓</td>
</tr>
<tr>
<td>5.2</td>
<td>perf.tar.gz</td>
<td>性能监控工具包</td>
<td class="status status-通过">通过</td>
<td>新环境不存在 ✓</td>
</tr>
</tbody>
</table>
</div>
<div id="新增" class="tab-content ">
<div class="summary">
<h2>新增</h2>
<div class="summary-stats">
<span class="stat-item">总计: <strong>1</strong></span>
<span class="stat-item stat-fail">失败: 1</span>
</div>
</div>
<table class="data-table">
<thead><tr>
<th>章节</th><th>变更项</th><th>描述</th><th>验证状态</th><th>备注</th>
</tr></thead>
<tbody>
<tr>
<td>5.1</td>
<td>agent-v2.0.jar</td>
<td>新版监控代理</td>
<td class="status status-失败">失败</td>
<td>新环境不存在该文件</td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
<script>

function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
}
document.addEventListener('DOMContentLoaded', function() {
    document.querySelector('.tab-button')?.click();
});

</script>
</body>
</html>
