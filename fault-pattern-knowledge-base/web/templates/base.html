<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

    <!-- Highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>

    {% block head %}{% endblock %}
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="{{ url_for('main.index') }}">{{ app_name }}</a>
            </div>
            <div class="nav-menu">
                <a href="{{ url_for('main.index') }}" class="nav-link">首页</a>
                <a href="{{ url_for('main.patterns_list') }}" class="nav-link">所有故障</a>
                <form action="{{ url_for('main.search') }}" method="get" class="search-form">
                    <input type="text" name="q" placeholder="搜索故障模式..." class="search-input">
                    <button type="submit" class="search-button">搜索</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="container">
            <div class="content-wrapper">
                <!-- 左侧边栏 - 分类 -->
                <aside class="sidebar">
                    <div class="sidebar-section">
                        <h3>分类</h3>
                        <ul class="category-list">
                            {% if categories %}
                                {% for cat in categories %}
                                <li>
                                    <a href="{{ url_for('main.category', category_name=cat.name) }}"
                                       class="category-link {% if category_name == cat.name %}active{% endif %}">
                                        <span class="category-name">{{ cat.display_name }}</span>
                                        <span class="category-count">{{ cat.count }}</span>
                                    </a>
                                </li>
                                {% endfor %}
                            {% endif %}
                        </ul>
                    </div>
                </aside>

                <!-- 主内容 -->
                <div class="content">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 {{ app_name }} | 用于混沌工程测试</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // 初始化代码高亮
        document.addEventListener('DOMContentLoaded', function() {
            hljs.highlightAll();
        });

        // 复制到剪贴板功能
        function copyToClipboard(button) {
            const codeBlock = button.parentElement.querySelector('code');
            const text = codeBlock.textContent;

            navigator.clipboard.writeText(text).then(function() {
                const originalText = button.textContent;
                button.textContent = '已复制!';
                button.classList.add('copied');

                setTimeout(function() {
                    button.textContent = originalText;
                    button.classList.remove('copied');
                }, 2000);
            });
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
